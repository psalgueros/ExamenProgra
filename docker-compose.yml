services:
  mysql-db:
    image: mysql:8.0
    container_name: product_mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: ProductDB
      MYSQL_USER: api_user
      MYSQL_PASSWORD: apipassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  productapi:
    build:
      context: ./ProductApi
      dockerfile: Dockerfile
    image: productapi:latest
    depends_on:
      - mysql-db
    environment:
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=Server=mysql-db;Port=3306;Database=ProductDB;Uid=api_user;Pwd=apipassword;
    ports:
      - "5000:80"
    networks:
      - app-network

volumes:
  mysql_data:

networks:
  app-network:
    driver: bridge